<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento — 1K Beats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; background: #F0F0F0; min-height: 100vh; padding: 1.5rem 1rem; color: #111; }
  .card { max-width: 680px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

  /* HEADER */
  .hdr { background: #111; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .hdr img { height: 60px; width: auto; }
  .hdr-right { text-align: right; }
  .doc-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #D91A72; margin-bottom: 4px; }
  .doc-title { font-size: 28px; font-weight: 700; color: white; letter-spacing: -0.02em; line-height: 1; margin-bottom: 8px; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.5); line-height: 1.9; }
  .meta strong { color: rgba(255,255,255,0.8); }

  /* BODY */
  .body { padding: 1.75rem 2rem; }
  .client-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid #EEE; margin-bottom: 1.5rem; }
  .cf-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #AAA; margin-bottom: 4px; }
  .cf-val { font-size: 13px; font-weight: 600; color: #111; }
  .ref-row { font-size: 12px; color: #555; padding-bottom: 1.25rem; border-bottom: 1px solid #EEE; margin-bottom: 1.5rem; }
  .ref-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #AAA; margin-bottom: 4px; }

  /* TABELA */
  .sec-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; color: #AAA; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #EEE; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  thead th { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #AAA; padding: 8px 10px; border-bottom: 2px solid #111; text-align: left; }
  thead th:not(:first-child) { text-align: right; }
  thead th:nth-child(2) { text-align: center; }
  tbody tr:nth-child(even) { background: #F9F9F9; }
  tbody td { font-size: 13px; color: #111; padding: 9px 10px; border-bottom: 1px solid #EEE; }
  tbody td:not(:first-child) { text-align: right; }
  tbody td:nth-child(2) { text-align: center; }
  tbody td:last-child { font-weight: 700; }

  /* TOTAIS */
  .totals { display: flex; justify-content: flex-end; margin-top: 0.5rem; }
  .totals-inner { width: 240px; }
  .tot-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; padding: 4px 0; }
  .tot-row span:last-child { color: #111; font-weight: 500; }
  .tot-disc span:last-child { color: #E24B4A; }
  .tot-final { display: flex; justify-content: space-between; padding-top: 10px; margin-top: 6px; border-top: 2px solid #111; }
  .tot-final .lbl { font-size: 12px; font-weight: 700; color: #111; }
  .tot-final .val { font-size: 20px; font-weight: 700; color: #D91A72; }

  /* OBS */
  .obs-block { margin-top: 1.5rem; padding: 12px 16px; border-left: 3px solid #D91A72; background: #FDF5F9; border-radius: 0 6px 6px 0; }
  .obs-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #AAA; margin-bottom: 6px; }
  .obs-text { font-size: 12px; color: #444; line-height: 1.7; white-space: pre-wrap; }

  /* FOOTER */
  .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #EEE; display: flex; justify-content: space-between; font-size: 10px; color: #AAA; flex-wrap: wrap; gap: 4px; }

  /* VAZIO */
  .empty { text-align: center; padding: 3rem 1rem; color: #AAA; }
  .empty h2 { font-size: 18px; margin-bottom: 8px; color: #CCC; }

  .btn-salvar {
    display: block; margin: 1.5rem auto 0;
    background: #111; color: white; border: none;
    border-radius: 8px; height: 46px; padding: 0 28px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: Arial, Helvetica, sans-serif;
    transition: background .15s;
  }
  .btn-salvar:hover { background: #D91A72; }
  .btn-rodape { text-align: center; padding: 1.5rem 2rem 2rem; border-top: 1px solid #EEE; }
  @media (max-width: 480px) {
    .hdr { padding: 1rem; flex-direction: row; }
    .hdr img { height: 44px; }
    .doc-title { font-size: 20px; }
    .body { padding: 1.25rem 1rem; }
    .client-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
    .client-grid > div:last-child { grid-column: 1 / -1; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="card" id="cardOrc">
  <div class="empty" id="emptyState">
    <h2>Nenhum orçamento encontrado</h2>
    <p>Este link pode estar incorreto ou expirado.</p>
  </div>
  <div class="btn-rodape" id="btnRodape" style="display:none">
    <button class="btn-salvar" id="btnSalvarPDF">
      Salvar PDF
    </button>
  </div>
</div>

<script>
(function() {
  var SURL = 'https://SUPABASE_URL_PLACEHOLDER';
  var SKEY = 'SUPABASE_ANON_KEY_PLACEHOLDER';
  var LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60"><rect width="56" height="56" x="2" y="2" rx="12" fill="#D91A72"/><text x="8" y="42" font-family="Nunito,Arial,sans-serif" font-weight="900" font-size="30" fill="white">1K</text><path d="M70 18 C82 26 82 34 70 42" stroke="#D91A72" stroke-width="3.5" stroke-linecap="round" fill="none"/><path d="M78 12 C96 22 96 38 78 48" stroke="#D91A72" stroke-width="3.5" stroke-linecap="round" fill="none"/><path d="M86 8 C108 20 108 40 86 52" stroke="#D91A72" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.55"/><text x="100" y="36" font-family="Nunito,Arial,sans-serif" font-weight="700" font-size="14" fill="#2A2A35">beats</text></svg>`;

  function fmt(v) {
    return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    var s = String(iso).substring(0,10);
    var p = s.split('-');
    return p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : iso;
  }

  function montarOrcamento(d) {
    var it = d.it || [];
    var sub = 0;
    var rows = '';
    it.forEach(function(item, i) {
      var q = parseFloat(item.q || item.qty || 0);
      var u = parseFloat(item.u || item.unit || 0);
      var tot = q * u;
      sub += tot;
      var bg = i%2===1 ? 'background:#F9F9F9' : '';
      rows += '<tr style="'+bg+'">'
        + '<td style="padding:9px 10px;font-size:13px;color:#111;border-bottom:1px solid #EEE">'+(item.d||item.desc||'—')+'</td>'
        + '<td style="padding:9px 10px;font-size:13px;text-align:center;border-bottom:1px solid #EEE">'+q+'</td>'
        + '<td style="padding:9px 10px;font-size:13px;text-align:right;border-bottom:1px solid #EEE">'+fmt(u)+'</td>'
        + '<td style="padding:9px 10px;font-size:13px;font-weight:700;text-align:right;border-bottom:1px solid #EEE">'+fmt(tot)+'</td>'
        + '</tr>';
    });
    var dv = parseFloat(d.dv||d.desconto||0);
    var dt = d.dt||d.tipo_desc||'pct';
    var dr = dt==='pct' ? (sub*dv/100) : dv;
    var total = Math.max(0, sub-dr);
    var discRow = '';
    if (dr > 0) {
      var dl = dt==='pct' ? dv.toFixed(1)+'%' : fmt(dr);
      discRow = '<tr><td style="padding:5px 10px;font-size:12px;color:#888">Desconto ('+dl+')</td>'
              + '<td style="padding:5px 10px;font-size:12px;color:#D84040;text-align:right">- '+fmt(dr)+'</td></tr>';
    }
    var obs = d.o||d.obs||'';
    var obsBlock = obs ? '<div style="margin-top:28px;padding:12px 16px;border-left:3px solid #D91A72;background:#FDF5F9;border-radius:0 6px 6px 0">'
      + '<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#AAA;margin-bottom:6px">Observações</div>'
      + '<div style="font-size:12px;color:#444;line-height:1.7;white-space:pre-wrap">'+obs+'</div></div>' : '';
    var en = d.en||d.empresa||'1K Beats';
    var ec = d.ec||d.cnpj_emp||'';
    var et = d.et||d.tel_emp||'';
    var ee = d.ee||d.email_emp||'';
    var f1 = en + (ec ? ' · CNPJ: '+ec : '');
    var f2 = et + (ee ? (et?' · ':'')+ee : '');
    var v = d.v||d.valido_ate||'';

    document.getElementById('cardOrc').innerHTML =
      '<div class="hdr">'
        + '<div style="display:inline-block">'+LOGO_SVG+'</div>'
        + '<div class="hdr-right">'
          + '<div class="doc-label">Documento Comercial</div>'
          + '<div class="doc-title">Orçamento</div>'
          + '<div class="meta">'
            + '<div><strong>Emissão</strong> &nbsp;'+new Date().toLocaleDateString('pt-BR')+'</div>'
            + '<div><strong>Validade</strong> &nbsp;'+fmtDate(v)+'</div>'
            + (d.r||d.referencia ? '<div><strong>Ref.</strong> &nbsp;'+(d.r||d.referencia)+'</div>' : '')
          + '</div>'
        + '</div>'
      + '</div>'
      + '<div class="body">'
        + '<div class="client-grid">'
          + '<div><div class="cf-label">Cliente</div><div class="cf-val">'+(d.c||d.cliente||'—')+'</div></div>'
          + '<div><div class="cf-label">CNPJ / CPF</div><div class="cf-val">'+(d.cc||d.cnpj_cli||'—')+'</div></div>'
          + '<div style="text-align:right"><div class="cf-label">Emitido por</div>'
            + '<div class="cf-val" style="font-size:12px">'+en+(ec?'<br><span style="font-size:10px;color:#888;font-weight:400">'+ec+'</span>':'')+'</div>'
          + '</div>'
        + '</div>'
        + '<div class="sec-label">Itens do orçamento</div>'
        + '<table><thead><tr>'
          + '<th style="width:50%">Descrição</th>'
          + '<th style="width:8%;text-align:center">Qtd.</th>'
          + '<th style="width:20%">Val. unitário</th>'
          + '<th style="width:20%">Total</th>'
        + '</tr></thead><tbody>'+rows+'</tbody></table>'
        + '<div style="display:flex;justify-content:flex-end;margin-top:14px">'
          + '<div style="width:260px"><table width="100%" cellpadding="0" cellspacing="0">'
            + '<tbody>'
              + '<tr><td style="padding:5px 10px;font-size:12px;color:#888">Subtotal</td><td style="padding:5px 10px;font-size:12px;text-align:right;color:#111;font-weight:500">'+fmt(sub)+'</td></tr>'
              + discRow
            + '</tbody>'
            + '<tbody><tr><td style="font-size:16px;font-weight:700;color:#111;border-top:2px solid #111;padding:10px">Total</td>'
              + '<td style="font-size:16px;font-weight:700;color:#D91A72;border-top:2px solid #111;padding:10px;text-align:right">'+fmt(total)+'</td></tr>'
            + '</tbody>'
          + '</table></div>'
        + '</div>'
        + obsBlock
        + '<div class="footer"><div>'+f1+'</div><div>'+f2+'</div></div>'
      + '</div>';

    var btn = document.getElementById('btnRodape');
    if (btn) btn.style.display = 'block';
  }

  // Verificar tipo de link
  var params = new URLSearchParams(window.location.search);
  var orcId  = params.get('id');

  if (orcId) {
    document.getElementById('cardOrc').innerHTML = '<div class="empty"><h2>Carregando...</h2><p>Buscando orçamento #'+orcId+'</p></div>';
    fetch(SURL+'/rest/v1/orcamentos?id=eq.'+orcId+'&select=*', {
      headers: { 'apikey': SKEY, 'Authorization': 'Bearer '+SKEY, 'Accept': 'application/json' }
    })
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || rows.length === 0) {
        document.getElementById('cardOrc').innerHTML = '<div class="empty"><h2>Orçamento #'+orcId+' não encontrado</h2><p>Verifique o link e tente novamente.</p></div>';
        return;
      }
      var row = rows[0];
      var itens = (row.itens||[]).map(function(i) {
        return { d: i.desc||i.d||'', q: parseFloat(i.qty||i.q||0), u: parseFloat(i.unit||i.u||0) };
      });
      montarOrcamento({
        c: row.cliente, cc: row.cnpj_cli, r: row.referencia,
        v: row.valido_ate, dv: row.desconto, dt: row.tipo_desc,
        it: itens, o: row.obs,
        en: row.empresa, ec: row.cnpj_emp, et: row.tel_emp, ee: row.email_emp
      });
    })
    .catch(function(e) {
      document.getElementById('cardOrc').innerHTML = '<div class="empty"><h2>Erro ao carregar</h2><p>'+e.message+'</p></div>';
    });
    return;
  }

  // Formato legado Base64
  var hash = window.location.hash;
  if (!hash) return;
  try {
    var raw = hash.replace('#orc=','').replace('#','');
    var parsed = JSON.parse(decodeURIComponent(escape(atob(raw))));
    var d;
    if (Array.isArray(parsed)) {
      d = { c:parsed[0], cc:parsed[1], r:parsed[2], v:parsed[3], dv:parsed[4], dt:parsed[5],
            it:(parsed[6]||[]).map(function(i){ return {d:i[0],q:i[1],u:i[2]}; }),
            en:parsed[7]||'', ec:parsed[8]||'' };
    } else {
      d = parsed;
      d.it = (d.it||[]).map(function(i){ return Array.isArray(i)?{d:i[0],q:i[1],u:i[2]}:i; });
    }
    montarOrcamento(d);
  } catch(e) { console.log('Erro link legado:', e); }

})();
</script>
</body>
</html>
